<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Convertisseur</title>
</head>
<body>
  <div class="container">
    <h1>Convertisseur</h1>
    
  <div class="inputs-group">
    <input type="text" id="input" placeholder="Indiquer une quantité">
    <span>=</span>
    <input placeholder="resultat" type="text" id="resultat">
  </div>
  
<div class="cont-select">
    <select id="unites">
      <option value="Metre">Metre</option>
      <option value="Kilometre">Kilometre</option>
      <option value="Centimetre">Centimetre</option>
    </select>
    
    <select id="unitesResultat">
    <option value="Metre">Metre</option>
      <option value="Kilometre">Kilometre</option>
      <option value="Centimetre">Centimetre</option>
    
    </select>
  </div>
</div>




  <script src="app.js"></script>
</body>
</html>
